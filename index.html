    @keyframes slowZoom {

    .overlay {
      position:fixed; inset:0;
      background:
        linear-gradient(
          to bottom,
          rgba(0,0,0,.1) 0%,
          rgba(8,8,25,.4) 35%,
          rgba(8,8,25,.78) 70%,
          rgba(0,0,0,.93) 100%
        );
    }

    .stage {
      position:fixed; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:24px;
    }

    .dots {
      display:flex; gap:10px; margin-bottom:20px;
      animation:fadeDown .8s ease both;
    }
    .dot {
      width:8px; height:8px; border-radius:50%;
      animation:twinkle 2s ease-in-out infinite;
    }
    .dot:nth-child(1) { background:#f7a815; }
    .dot:nth-child(2) { background:#e8175d; animation-delay:.25s; }
    .dot:nth-child(3) { background:#3ab5c6; animation-delay:.5s; }
    .dot:nth-child(4) { background:#f7a815; animation-delay:.75s; }
    .dot:nth-child(5) { background:#e8175d; animation-delay:1s; }
    @keyframes twinkle {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.3; transform:scale(.55); }
    }

    .linea {
      display:flex; align-items:center; gap:12px;
      margin-bottom:16px;
      animation:fadeDown .8s .1s ease both; opacity:0;
    }
    .linea-bar {
      height:1.5px; width:55px;
      background:linear-gradient(to right, transparent, #f7a815, transparent);
    }
    .linea-text {
      font-size:.7rem; font-weight:800; letter-spacing:5px;
      color:#f7a815; text-transform:uppercase;
    }

    .nombre {
      font-family:'Pacifico',cursive;
      font-size:clamp(2.6rem,10vw,5rem);
      color:#fff; text-align:center; line-height:1.1;
      text-shadow:
        0 2px 30px rgba(232,23,93,.55),
        0 4px 60px rgba(0,0,0,.5),
        3px 5px 0 rgba(0,0,0,.25);
      animation:fadeUp .9s .25s ease both; opacity:0;
    }

    .subtitulo {
      font-size:clamp(.65rem,2.2vw,.85rem);
      font-weight:800; letter-spacing:6px;
      color:rgba(255,255,255,.6);
      text-transform:uppercase; margin-top:10px;
      animation:fadeUp .9s .4s ease both; opacity:0;
    }

    .sep {
      display:flex; align-items:center; gap:16px;
      margin:30px 0 24px;
      animation:fadeUp .9s .55s ease both; opacity:0;
    }
    .sep-line {
      height:1px; width:90px;
      background:linear-gradient(to right, transparent, rgba(255,255,255,.3));
    }
    .sep-line.r {
      background:linear-gradient(to left, transparent, rgba(255,255,255,.3));
    }
    .sep-icon { font-size:1.5rem; }

    .memoria-wrap {
      display:flex; flex-direction:column; align-items:center;
      animation:fadeUp .9s .7s ease both; opacity:0;
    }
    .memoria-label {
      font-family:'Playfair Display',serif;
      font-style:italic;
      font-size:clamp(.75rem,2.4vw,.9rem);
      color:rgba(255,255,255,.5);
      letter-spacing:2px; margin-bottom:6px;
    }
    .memoria-nombre {
      font-family:'Playfair Display',serif;
      font-size:clamp(1.1rem,4vw,1.55rem);
      color:#f7d080;
      text-shadow:0 2px 14px rgba(247,168,21,.45);
      letter-spacing:3px;
    }

    .vela {
      margin-top:30px; font-size:1.8rem;
      animation:vela 1.7s ease-in-out infinite, fadeUp .9s .85s ease both;
      opacity:0;
      filter:drop-shadow(0 0 10px rgba(247,210,80,.8));
    }
    @keyframes vela {
      0%,100% { transform:scale(1) rotate(-2deg); filter:drop-shadow(0 0 8px rgba(247,210,80,.7)); }
      50%      { transform:scale(1.1) rotate(2deg);  filter:drop-shadow(0 0 22px rgba(247,210,80,1)); }
    }

    .loader-wrap {
      position:fixed; bottom:52px;
      left:50%; transform:translateX(-50%);
      display:flex; flex-direction:column; align-items:center; gap:10px;
      animation:fadeUp .9s 1.1s ease both; opacity:0;
    }
    .loader-bar {
      width:170px; height:3px;
      background:rgba(255,255,255,.12);
      border-radius:10px; overflow:hidden;
    }
    .loader-fill {
      height:100%;
      background:linear-gradient(90deg,#e8175d,#f7a815,#3ab5c6);
      border-radius:10px;
      animation:load 2.8s ease-in-out forwards;
    }
    @keyframes load { 0% { width:0%; } 100% { width:100%; } }

    .loader-text {
      font-size:.68rem; font-weight:800; letter-spacing:3px;
      color:rgba(255,255,255,.4); text-transform:uppercase;
      animation:blink 1.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100% { opacity:.4; } 50% { opacity:1; } }

    .btn-entrar {
      display:none;
      background:linear-gradient(135deg,#e8175d,#c0104a);
      color:#fff; border:none; border-radius:50px;
      font-family:'Nunito',sans-serif; font-weight:800;
      font-size:.9rem; letter-spacing:2px;
      padding:13px 34px; cursor:pointer;
      box-shadow:0 4px 22px rgba(232,23,93,.55);
      transition:transform .2s, box-shadow .2s;
      animation:appear .5s ease both;
    }
    .btn-entrar:hover {
      transform:translateY(-3px);
      box-shadow:0 8px 30px rgba(232,23,93,.65);
    }
    @keyframes appear {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(22px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-14px); }
      to   { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
